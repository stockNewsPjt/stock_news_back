spring.application.name=stock_news_back
spring.profiles.include=secret

# ==================== JWT ====================
jwt.access-expiration=1800000
jwt.refresh-expiration=1209600000

# ==================== Cookie ====================
# ?? ? true? ?? (HTTPS)
app.cookie.secure=false
app.frontend-url=http://localhost:3000

# ==================== PostgreSQL ====================
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Redis ====================
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=-1ms

# ==================== Crawler ====================
crawler.target-tickers=NVDA,AAPL,TSLA,MSFT,AMZN,GOOGL,META
crawler.schedule.enabled=true
# 앱 시작 즉시 실행(initial-delay-ms=0), 이후 1시간마다 반복
crawler.schedule.initial-delay-ms=0
crawler.schedule.fixed-delay-ms=3600000

# ==================== Alpha Vantage ====================
alphavantage.base-url=https://www.alphavantage.co
# 조회 범위: 직전 실행 이후 기사를 놓치지 않도록 crawl 주기보다 여유 있게 설정
alphavantage.lookback-hours=2
alphavantage.topics=technology,artificial_intelligence